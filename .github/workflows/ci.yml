name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev,gnn,serve,dash,git]"

      - name: Run test suite
        run: pytest tests/ -v --cov=graphguard --cov-report=term-missing

      - name: Smoke-test end-to-end pipeline
        run: |
          python -m graphguard.cli analyze examples/sample_project
          python -m graphguard.cli train examples/sample_project --epochs 50
          python -m graphguard.cli report examples/sample_project --top-n 5
          python -m graphguard.cli explain examples/sample_project process_order_data --epochs 50
